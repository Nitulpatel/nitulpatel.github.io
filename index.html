<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nitul Patel | Full-Stack WordPress Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        background: #0a0a0a; 
        color: #fff; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
      .error-box {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0a0a0a;
        padding: 20px;
      }
      .error-content {
        text-align: center;
        max-width: 500px;
      }
      .error-content h1 { font-size: 24px; margin-bottom: 10px; color: #ff4747; }
      .error-content p { color: #888; line-height: 1.6; }
    </style>
    <script>
      // GitHub Pages SPA decode: turn "/?/<route>" back into real route.
      (function (l) {
        if (l.search && l.search.startsWith('?/')) {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (part) {
              return part.replace(/~and~/g, '&');
            })
            .join('?');

          var newUrl = l.pathname.replace(/\/$/, '') + decoded + l.hash;
          window.history.replaceState(null, '', newUrl || '/');
        }
      })(window.location);

      // Global error handler
      window.addEventListener('error', (e) => {
        console.error('Global error:', e.error);
      });
      window.addEventListener('unhandledrejection', (e) => {
        console.error('Unhandled rejection:', e.reason);
      });
    </script>
    <script type="module" crossorigin src="/assets/index-D5Rdxh1U.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BNML8HPH.css">
  </head>

    <div id="root">
      <div class="error-box">
        <div class="error-content">
          <h1>Loading...</h1>
          <p>Portfolio is loading. If this takes more than a few seconds, please refresh the page.</p>
        </div>
      </div>
    </div>
  </body>
